<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<title>DynaSTU 27 Ledger</title>
<style>
  :root{
    --turf:#0f2a1f;
    --turf-line:#1c4430;
    --chalk:#f3f1e7;
    --chalk-dim:#b9c4b9;
    --gold:#c9a04a;
    --battle:#8a3b2b;
    --safe:#2c5a3f;
    --ink:#081712;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--turf);
    background-image:
      repeating-linear-gradient(90deg, var(--turf-line) 0 2px, transparent 2px 120px);
    color:var(--chalk);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
  }
  h1,h2,h3,.display{
    font-family:'Oswald','Arial Narrow',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .mono{ font-family:'JetBrains Mono','Courier New',monospace; }
  header{
    padding:28px 32px 18px;
    border-bottom:3px double var(--gold);
  }
  header h1{
    margin:0;
    font-size:32px;
    color:var(--chalk);
    display:flex; align-items:baseline; gap:14px;
  }
  header h1 span.tag{
    font-size:13px; color:var(--gold); letter-spacing:0.15em; font-weight:400;
  }
  header .sub{ color:var(--chalk-dim); margin-top:6px; font-size:14px; }
  nav{
    display:flex; gap:4px; padding:0 32px; background:var(--ink);
    border-bottom:1px solid var(--turf-line);
  }
  nav button{
    background:none;border:none;color:var(--chalk-dim);
    padding:14px 18px; font-family:'Oswald',sans-serif; text-transform:uppercase;
    letter-spacing:0.06em; font-size:13px; cursor:pointer; border-bottom:3px solid transparent;
  }
  nav button.active{ color:var(--gold); border-bottom-color:var(--gold); }
  main{ padding:26px 32px 60px; max-width:1300px; margin:0 auto; }
  .card{
    background:rgba(243,241,231,0.04);
    border:1px solid var(--turf-line);
    border-radius:4px;
    padding:18px 20px;
    margin-bottom:20px;
  }
  .grid-confs{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; margin-bottom:22px;}
  .conf-pill{
    background:rgba(0,0,0,0.25); border:1px solid var(--turf-line); border-radius:4px;
    padding:10px 14px; cursor:pointer; font-family:'Oswald',sans-serif; text-transform:uppercase;
    letter-spacing:0.05em; font-size:13px; display:flex; justify-content:space-between; align-items:center;
  }
  .conf-pill:hover{ border-color:var(--gold); }
  .conf-pill.elite{ color:var(--gold); }
  .conf-pill small{ color:var(--chalk-dim); font-weight:400; letter-spacing:0; }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th{
    text-align:left; padding:8px 8px; color:var(--gold); font-family:'Oswald',sans-serif;
    text-transform:uppercase; font-size:11.5px; letter-spacing:0.05em;
    border-bottom:1px solid var(--turf-line); position:sticky; top:0; background:var(--turf);
  }

// Generic FCS stand-in. Deliberately kept OUT of the TEAMS array so it never enters
// conferences, reseeding, or any of the three ranking tabs (Standings/Weekly/Overall).
// Its rating is kept synced to always be worse than every real team, for SOS purposes.
const FCS_TEAM_NAME = "Furman";
function allSelectableOpponents(){
  return [...TEAMS, {name: FCS_TEAM_NAME}];
}
function alphabeticalOpponents(){
  return allSelectableOpponents().slice().sort((a,b)=>a.name.localeCompare(b.name));
}
function syncFCSRating(){
  if(!state.teams[FCS_TEAM_NAME]) return;
  const lowest = Math.min(...TEAMS.map(t=>state.teams[t.name].careerRating));
  const val = lowest - 1;
  state.teams[FCS_TEAM_NAME].careerRating = val;
  state.teams[FCS_TEAM_NAME].preseason = val;
}

const GAME_TYPES = [
  {key:"rivalry",  label:"Rivalry Game",              winKey:"bonusRivalry",     lossKey:null},
  {key:"bowl",     label:"Bowl Game",                 winKey:"bonusBowlWin",     lossKey:"bonusBowlLoss"},
  {key:"ccg",      label:"Conference Championship",   winKey:"bonusCCGWin",      lossKey:"bonusCCGLoss"},
  {key:"playoff",  label:"Playoff Game",              winKey:"bonusCCGWin",      lossKey:"bonusCCGLoss"},
  {key:"natTitle", label:"National Title Game",       winKey:"bonusNatTitleWin", lossKey:"bonusNatTitleLoss"},
];
function gameBonusValue(game, weights){
  const isWin = game.pf > game.pa;
  const isLoss = game.pf < game.pa;
  if(!isWin && !isLoss) return 0; // tie: no bonus either way
  let best = 0;
  GAME_TYPES.forEach(gt=>{
    if(game.types && game.types[gt.key]){
      const key = isWin ? gt.winKey : gt.lossKey;
      if(key) best = Math.max(best, weights[key] || 0);
    }
  });
  return best;
}
function gameTypeBadges(game){
  return GAME_TYPES.filter(gt=>game.types && game.types[gt.key])
    .map(gt=>`<span class="badge promo">${gt.label}</span>`).join(" ");
}

// Storage abstraction: prefer Claude's window.storage (works inside claude.ai Artifacts),
// fall back to browser localStorage (works when this file is opened standalone),
// fall back to in-memory only as a last resort — and always surface which mode is active
// so a persistence failure is never silent again.
let storageMode = "unknown";

function hasClaudeStorage(){
  return typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
}
function hasLocalStorage(){
  try{
    if(typeof localStorage === "undefined") return false;
    const testKey = "__storage_test__";
    localStorage.setItem(testKey, "1");
    localStorage.removeItem(testKey);
    return true;
  }catch(e){ return false; }
}

async function storageGet(key){
  if(hasClaudeStorage()){
    try{
      const res = await window.storage.get(key, false);
      storageMode = "claude";
      return res && res.value ? res.value : null;
    }catch(e){ /* fall through */ }
  }
  if(hasLocalStorage()){
    storageMode = "local";
    return localStorage.getItem(key);
  }
  storageMode = "none";
  return null;
}
async function storageSet(key, value){
  if(hasClaudeStorage()){
    try{
      await window.storage.set(key, value, false);
      storageMode = "claude";
      return true;
    }catch(e){ /* fall through */ }
  }
  if(hasLocalStorage()){
    try{
      localStorage.setItem(key, value);
      storageMode = "local";
      return true;
    }catch(e){ /* fall through */ }
  }
  storageMode = "none";
  return false;
}

function renderStorageBanner(){
  const el = document.getElementById("storageBanner");
  if(!el) return;
  if(!el.style) el.style = {};
  if(storageMode === "none"){
    el.style.display = "block";
    el.style.background = "rgba(181,69,58,0.25)";
    el.style.color = "#ff9d90";
    el.textContent = "⚠️ No storage available — your browser is blocking both Claude storage and local storage (common in private/incognito mode or some file:// setups). Changes will NOT be saved when you close this tab.";
  } else {
    el.style.display = "none";
  }
}

async function loadState(){
  if(READ_ONLY){
    try{
      const res = await fetch('./data.json', {cache:'no-store'});
      if(res.ok){
        state = JSON.parse(await res.text());
        migrateState();
        return;
      }
    }catch(e){ /* fall through to empty view below */ }
    state = defaultState();
    return;
  }
  try{
    const raw = await storageGet(STORE_KEY);
    if(raw){
      state = JSON.parse(raw);
      migrateState();
      return;
    }
  }catch(e){ console.error("load failed", e); }
  state = defaultState();
  await saveState();
}
function migrateState(){
  let changed = false;
  if(!state.users){ state.users = {}; changed = true; }
  if(state.week===undefined){ state.week = 0; changed = true; }
  if(!state.teams[FCS_TEAM_NAME]){
    state.teams[FCS_TEAM_NAME] = { preseason: 60, careerRating: 60, history: [], allGames: [], isFCS: true };
    changed = true;
  }
  if(!state.weeklySnapshots){ state.weeklySnapshots = []; changed = true; }
  if(!state.seasonEndRankings){ state.seasonEndRankings = []; changed = true; }
  Object.values(state.users).forEach(u=>{
    if(u.isCPU===undefined){ u.isCPU = false; changed = true; }
    (u.tenures||[]).forEach(t=>{
      if(!t.position){ t.position = "HC"; changed = true; }
    });
  });
  Object.values(state.teams).forEach(t=>{
    if(!t.allGames){
      const oldGames = (t.cur && t.cur.games) || [];
      t.allGames = oldGames.map(g=>({...g, id: genId(),
        types: {rivalry:false, bowl: !!g.isBowl, ccg:false, playoff:false, natTitle:false},
        bowlName: "", site: "home", week: 0, season: state.season}));
      delete t.cur;
      changed = true;
    } else {
      t.allGames.forEach(g=>{
        if(!g.types){
          g.types = {rivalry:false, bowl: !!g.isBowl, ccg:false, playoff:false, natTitle:false};
          g.bowlName = g.bowlName || "";
          delete g.isBowl;
          changed = true;
        }
        if(!g.site){
          g.site = g.neutral ? "neutral" : (g.awayGame ? "away" : "home");
          delete g.neutral;
          delete g.awayGame;
          changed = true;
        }
        if(g.week===undefined){ g.week = 0; changed = true; }
      });
    }
  });
  if(state.weights.siteWinHome===undefined){
    Object.assign(state.weights, {
      siteWinHome:1.0, siteWinAway:1.2, siteWinNeutral:1.1,
      siteLossHome:1.0, siteLossAway:0.75, siteLossNeutral:0.9,
      siteSosHome:1.0, siteSosAway:1.15, siteSosNeutral:1.05
    });
    changed = true;
  }
  if(!state.weights.bonusRivalry || state.weights.bonusBowlWin===undefined){
    const w = state.weights;
    Object.assign(w, {
      bonusRivalry: w.bonusRivalry || 1,
      bonusBowlWin: w.bonusBowlWin!==undefined ? w.bonusBowlWin : (w.bonusBowl!==undefined ? w.bonusBowl : 2),
      bonusBowlLoss: w.bonusBowlLoss!==undefined ? w.bonusBowlLoss : 1,
      bonusCCGWin: w.bonusCCGWin!==undefined ? w.bonusCCGWin : (w.bonusCCG!==undefined ? w.bonusCCG : 3),
      bonusCCGLoss: w.bonusCCGLoss!==undefined ? w.bonusCCGLoss : 1.5,
      bonusNatTitleWin: w.bonusNatTitleWin!==undefined ? w.bonusNatTitleWin : (w.bonusNatTitle!==undefined ? w.bonusNatTitle : 5),
      bonusNatTitleLoss: w.bonusNatTitleLoss!==undefined ? w.bonusNatTitleLoss : 2.5,
    });
    delete w.bonusBowl; delete w.bonusCCG; delete w.bonusNatTitle;
    changed = true;
  }
  if(changed) saveState();
}
async function saveState(){
  if(READ_ONLY) return; // never persist anything for a read-only viewer
  const ok = await storageSet(STORE_KEY, JSON.stringify(state));
  if(!ok){ console.error("save failed: no storage backend available"); }
  renderStorageBanner();
}

function derivedStats(team, season){
  const t = state.teams[team];
  const w = state.weights;
  season = season===undefined ? state.season : season;
  const games = (t.allGames||[]).filter(g=>g.season===season);
  const gp = games.length;
  let win=0, loss=0, pf=0, pa=0;
  let recordScoreSum=0, sosWeightedSum=0, sosWeightTotal=0;
  games.forEach(g=>{
    pf += g.pf; pa += g.pa;
    const site = g.site || "home";
    const isWin = g.pf > g.pa, isLoss = g.pf < g.pa;
    if(isWin) win++;
    else if(isLoss) loss++;

    if(isWin){
      const key = site==="away" ? "siteWinAway" : (site==="neutral" ? "siteWinNeutral" : "siteWinHome");
      recordScoreSum += w[key];
    } else if(isLoss){
      const key = site==="away" ? "siteLossAway" : (site==="neutral" ? "siteLossNeutral" : "siteLossHome");
      recordScoreSum -= w[key];
    }

    const opp = state.teams[g.opponent];
    if(opp){
      const sosKey = site==="away" ? "siteSosAway" : (site==="neutral" ? "siteSosNeutral" : "siteSosHome");
      const sw = w[sosKey];
      sosWeightedSum += opp.careerRating * sw;
      sosWeightTotal += sw;
    }
  });
  const sos = sosWeightTotal>0 ? sosWeightedSum/sosWeightTotal : null;
  const recordScore = gp>0 ? recordScoreSum/gp : 0;
  return {gp, w:win, l:loss, pf, pa, sos, recordScore};
}

function seasonRating(team){
  const t = state.teams[team];
  const w = state.weights;
  const d = derivedStats(team);
  const ptDiffG = d.gp>0 ? (d.pf - d.pa)/d.gp : 0;
  const sos = d.sos===null ? w.defaultSos : d.sos;
  const games = (t.allGames||[]).filter(g=>g.season===state.season);
  const bonus = games.reduce((sum,g)=>sum + gameBonusValue(g, w), 0);
  return t.careerRating*w.preseason + d.recordScore*w.winpct + ptDiffG*w.ptdiff + sos*w.sos + bonus;
}

function projectedCareerRating(team){
  const t = state.teams[team];
  const sr = seasonRating(team);
  return t.careerRating*(1-state.weights.recency) + sr*state.weights.recency;
}

function tierOf(conf){
  if(conf==="Independents") return "Independent";
  return ELITE.includes(conf) ? "Elite" : "Standard";
}
const TIER_RANK = {"Elite":1, "Standard":2, "Independent":3};
const POSITIONS = [
  {key:"HC", label:"Head Coach"},
  {key:"OC", label:"Offensive Coordinator"},
  {key:"DC", label:"Defensive Coordinator"},
];
function positionLabel(key){
  const p = POSITIONS.find(p=>p.key===key);
  return p ? p.label : key;
}

function currentStaffOf(team){
  const staff = {HC:null, OC:null, DC:null};
  Object.values(state.users).forEach(u=>{
    (u.tenures||[]).forEach(t=>{
      if(t.team===team && t.endSeason===null){
        staff[t.position || "HC"] = u.name;
      }
    });
  });
  return staff;
}
function currentCoachOf(team){
  return currentStaffOf(team).HC;
}
function currentCoachInfoOf(team){
  for(const id in state.users){
    const u = state.users[id];
    const open = (u.tenures||[]).find(t=>t.endSeason===null && t.team===team && (t.position||"HC")==="HC");
    if(open) return {name: u.name, isCPU: !!u.isCPU};
  }
  return null;
}

function computeProjections(){
  const results = TEAMS.map(t=>({name:t.name, newCareer:projectedCareerRating(t.name)}));
  results.sort((a,b)=>b.newCareer-a.newCareer || a.name.localeCompare(b.name));
  const map = {};
  let idx = 0;
  CONF_ORDER.forEach(c=>{
    const n = CONF_SIZE[c];
    results.slice(idx, idx+n).forEach((r,i)=>{
      map[r.name] = {rank: idx+i+1, conf: c, rating: r.newCareer};
    });
    idx += n;
  });
  return map;
}

async function advanceWeek(){

function snapRank(snap, team){
  if(!snap) return undefined;
  if(snap.entries && snap.entries[team]) return snap.entries[team].rank;
  if(snap.ranks && snap.ranks[team]!==undefined) return snap.ranks[team]; // legacy snapshots
  return undefined;
}
function snapRating(snap, team){
  if(snap && snap.entries && snap.entries[team]) return snap.entries[team].rating;
  return null; // legacy snapshots never stored rating
}

function renderWeekly(){

  const isLive = weeklyViewWeek === null;

  let rows; // [{name, rank, rating}]
  let comparisonSnap;

  if(isLive){
    const arr = TEAMS.map(t=>({name:t.name, rating: seasonRating(t.name)}));
    arr.sort((a,b)=>b.rating-a.rating || a.name.localeCompare(b.name));
    rows = arr.map((r,i)=>({name:r.name, rank:i+1, rating:r.rating}));
    comparisonSnap = seasonSnaps.length ? seasonSnaps[seasonSnaps.length-1] : null;
  } else {
    const snap = seasonSnaps.find(s=>s.week===weeklyViewWeek);
    if(snap){
      const names = snap.entries ? Object.keys(snap.entries) : Object.keys(snap.ranks||{});
      rows = names.map(name=>({name, rank: snapRank(snap,name), rating: snapRating(snap,name)}))
        .sort((a,b)=>a.rank-b.rank);
    } else {
      rows = [];
    }
    const priorSnaps = seasonSnaps.filter(s=>s.week<weeklyViewWeek);
    comparisonSnap = priorSnaps.length ? priorSnaps[priorSnaps.length-1] : null;
  }

  const proj = isLive ? computeProjections() : null;

  const weekOptions = [`<option value="live" ${isLive?'selected':''}>Live (Week ${state.week})</option>`]

    </div>
  </div>`;

  html += `<div class="card"><table><thead><tr>
    <th>Rank</th><th>Δ</th><th>Team</th><th>Conference</th><th>Season Rtg</th><th>Proj. Next Season</th>
  </tr></thead><tbody>`;

  const filtered = rows.filter(r=>r.name.toLowerCase().includes(weeklySearch.toLowerCase()));
  if(filtered.length===0){
    html += `<tr><td colspan="6" class="empty">${rows.length===0 ? 'No snapshot found for that week' : `No teams match "${weeklySearch}"`}</td></tr>`;
  }
  filtered.forEach(r=>{
    let deltaStr = `<span style="color:var(--chalk-dim)">–</span>`;
    const prevRank = snapRank(comparisonSnap, r.name);
    if(prevRank!==undefined){
      const delta = prevRank - r.rank;
      if(delta>0) deltaStr = `<span style="color:var(--gold)">▲${delta}</span>`;
      else if(delta<0) deltaStr = `<span style="color:#b5453a">▼${Math.abs(delta)}</span>`;
    }
    const conf = CONF_ORDER.find(c=>state.conferences[c].includes(r.name));
    const ratingStr = r.rating===null ? `<span style="color:var(--chalk-dim)">—</span>` : r.rating.toFixed(1);
    const projStr = isLive ? `<span class="mono">#${proj[r.name].rank} · ${proj[r.name].conf}</span>` : `<span style="color:var(--chalk-dim)">—</span>`;
    html += `<tr>
      <td>${r.rank}</td>
      <td>${deltaStr}</td>
      <td>${r.name}</td>
      <td>${conf}</td>
      <td class="rating">${ratingStr}</td>
      <td class="mono">${projStr}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function userStats(userId){
  const user = state.users[userId];
  let totalW=0,totalL=0,totalT=0,pf=0,pa=0,seasonsCoached=0;
  let rivalryW=0,bowlW=0,bowlL=0,ccgW=0,ccgL=0,playoffW=0,playoffL=0,titleW=0,titleL=0;
  const tenureDetails=[];
  (user.tenures||[]).forEach(ten=>{
    const endS = ten.endSeason===null ? state.season : ten.endSeason;
    let tenW=0, tenL=0, tenT=0;
    for(let s=ten.startSeason; s<=endS; s++){
      const teamObj = state.teams[ten.team];
      if(!teamObj) continue;
      const games = (teamObj.allGames||[]).filter(g=>g.season===s);
      games.forEach(g=>{
        const isWin=g.pf>g.pa, isLoss=g.pf<g.pa;
        if(isWin){totalW++; tenW++;} else if(isLoss){totalL++; tenL++;} else {totalT++; tenT++;}
        pf+=g.pf; pa+=g.pa;
        if(g.types){
          if(g.types.rivalry && isWin) rivalryW++;
          if(g.types.bowl){ if(isWin) bowlW++; else if(isLoss) bowlL++; }
          if(g.types.ccg){ if(isWin) ccgW++; else if(isLoss) ccgL++; }
          if(g.types.playoff){ if(isWin) playoffW++; else if(isLoss) playoffL++; }
          if(g.types.natTitle){ if(isWin) titleW++; else if(isLoss) titleL++; }
        }
      });
      seasonsCoached++;
    }
    tenureDetails.push({
      team: ten.team, position: ten.position || "HC", startSeason: ten.startSeason, endSeason: ten.endSeason,
      endSeasonDisplay: endS, record: tenT ? `${tenW}-${tenL}-${tenT}` : `${tenW}-${tenL}`
    });
  });
  return {totalW,totalL,totalT,pf,pa,seasonsCoached,rivalryW,bowlW,bowlL,ccgW,ccgL,playoffW,playoffL,titleW,titleL,tenureDetails};
}

      if(staff[pos.key]){ skipped++; return; } // don't overwrite an existing assignment
      const id = genId();
      state.users[id] = {name: realName, isCPU:true, tenures:[
        {team, position:pos.key, startSeason: state.season, endSeason: null}
      ]};
      filled++;
    });
  });
  await saveState();
  render();
  return {filled, skipped};
}

const COACH_FIRST_NAMES = ["Mike","Tom","Dave","Chris","Steve","Mark","John","Greg","Kevin","Brian",
  "Scott","Jim","Bill","Rick","Doug","Gary","Larry","Randy","Curt","Dale",
  "Wade","Todd","Craig","Eric","Sean","Paul","Neal","Dennis","Frank","Roy"];
const COACH_LAST_NAMES = ["Sullivan","Harris","Coleman","Whitfield","Marsh","Danielson","Prescott","Whitmore","Callahan","Reeves",
  "Sutton","Marshall","Hutchins","Delgado","Osborne","Kingman","Vance","Holloway","Chastain","Blackwood",
  "Ferris","Lockhart","Winters","Abernathy","Steele","Hargrove","Fenwick","Talbot","Reddick","Sorensen"];

function buildCoachNamePool(){
  const pool = [];
  COACH_FIRST_NAMES.forEach(f=>COACH_LAST_NAMES.forEach(l=>pool.push(f+" "+l)));
  for(let i=pool.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
  return pool;
}

function countEmptyCoachSlots(){
  let count = 0;
  TEAMS.forEach(t=>{
    const staff = currentStaffOf(t.name);
    POSITIONS.forEach(p=>{ if(!staff[p.key]) count++; });
  });
  return count;
}

async function prefillCoaches(){
  if(READ_ONLY) return;
  const existingNames = new Set(Object.values(state.users).map(u=>u.name));
  const pool = buildCoachNamePool().filter(n=>!existingNames.has(n));
  let poolIdx = 0;
  let filled = 0;
  TEAMS.forEach(t=>{
    POSITIONS.forEach(pos=>{
      const staff = currentStaffOf(t.name);
      if(!staff[pos.key]){
        const name = pool[poolIdx] !== undefined ? pool[poolIdx] : `${pos.key} Coach ${genId().slice(0,4)}`;
        poolIdx++;
        const id = genId();
        state.users[id] = {name, isCPU:true, tenures:[
          {team:t.name, position:pos.key, startSeason: state.season, endSeason: null}
        ]};
        filled++;
      }
    });
  });
  await saveState();
  render();
  return filled;
}
window.prefillCoaches = prefillCoaches;

}

async function assignUserToTeam(userId, team, position){
  if(READ_ONLY) return;
  position = position || "HC";
  const now = state.season;
  const user = state.users[userId];
  // close this user's current open tenure, wherever/whatever it was (one job at a time)
  (user.tenures||[]).forEach(t=>{ if(t.endSeason===null) t.endSeason = now-1; });
  // close whoever currently holds this exact team+position
  Object.values(state.users).forEach(u=>{
    (u.tenures||[]).forEach(t=>{
      if(t.team===team && t.position===position && t.endSeason===null) t.endSeason = now-1;
    });
  });
  if(!user.tenures) user.tenures = [];
  user.tenures.push({team, position, startSeason: now, endSeason: null});
  await saveState();
}

function allTenuresFlat(){

  Object.keys(state.users).forEach(uid=>{
    const u = state.users[uid];
    (u.tenures||[]).forEach((t)=>{
      flat.push({userId: uid, userName: u.name, isCPU: !!u.isCPU, team: t.team, position: t.position || "HC",
        startSeason: t.startSeason, endSeason: t.endSeason});
    });

function renderCoachTree(){
  let html = `<div class="card"><h3 style="margin-top:0">Coach Tree</h3>
  <div class="hint">Every program's staff lineage — Head Coach, Offensive Coordinator, and Defensive Coordinator each get their own succession line. Notes under a name link to that person's other stops, so you can trace someone climbing from a coordinator job into a head coaching gig elsewhere.</div>
  </div>`;

  const flat = allTenuresFlat();
  if(flat.length===0){
    html += `<div class="card"><div class="empty">No coaching history yet — assign users to teams in the Users tab first</div></div>`;
    return html;
  }

  html += `<div class="card" style="padding:10px 16px">
    <label style="display:flex;align-items:center;gap:8px;font-size:13px">
      <input type="checkbox" id="treeHumanOnly" ${treeHumanOnly?'checked':''} onchange="toggleTreeHumanOnly()">
      Human coaches only <span style="color:var(--chalk-dim)">(dim out CPU-run programs)</span>
    </label>
  </div>`;

  // group by team, then by position
  const byTeam = {};
  flat.forEach(t=>{
    if(!byTeam[t.team]) byTeam[t.team] = {HC:[], OC:[], DC:[]};
    byTeam[t.team][t.position].push(t);
  });

  // per-user full chronological list (for prev/next cross-links regardless of team or position)
  const byUser = {};
  flat.forEach(t=>{
    if(!byUser[t.userId]) byUser[t.userId] = [];
    byUser[t.userId].push(t);
  });
  Object.values(byUser).forEach(list=>list.sort((a,b)=>a.startSeason-b.startSeason));

  const teamNames = Object.keys(byTeam).sort();
  teamNames.forEach(team=>{
    const conf = CONF_ORDER.find(c=>state.conferences[c].includes(team));
    const posLanes = POSITIONS.filter(p=>byTeam[team][p.key].length>0);
    if(posLanes.length===0) return;
    const teamHasHuman = posLanes.some(p=>byTeam[team][p.key].some(t=>!t.isCPU));
    if(treeHumanOnly && !teamHasHuman) return;

    html += `<div class="card">
      <div class="tree-team-header"><h3 style="margin:0;font-size:15px">${team}</h3><span class="tier-tag">${conf||''}</span></div>`;

    posLanes.forEach(posInfo=>{
      const chain = byTeam[team][posInfo.key].sort((a,b)=>a.startSeason-b.startSeason);
      html += `<div style="margin-top:10px"><div class="tier-tag" style="margin-bottom:2px">${posInfo.label}</div><div class="tree-row">`;
      chain.forEach((t,i)=>{
        const endLabel = t.endSeason===null ? 'Present' : `S${t.endSeason}`;
        const userList = byUser[t.userId];
        const idx = userList.findIndex(x=>x===t);
        const prev = idx>0 ? userList[idx-1] : null;
        const next = idx<userList.length-1 ? userList[idx+1] : null;
        let alsoStr = "";
        if(prev && (prev.team!==t.team || prev.position!==t.position)) alsoStr += `from ${positionLabel(prev.position)} @ ${prev.team} `;
        if(next && (next.team!==t.team || next.position!==t.position)) alsoStr += `→ later ${positionLabel(next.position)} @ ${next.team}`;
        const dimmed = treeHumanOnly && t.isCPU;
        html += `<div class="tree-node ${t.isCPU?'cpu':''}" style="cursor:pointer;${dimmed?'opacity:0.35':''}" onclick="openUserDetail('${t.userId}')">
          <div class="pos">${posInfo.label} ${t.isCPU?'<span class="badge dash" style="margin-left:4px">CPU</span>':''}</div>
          <div class="who">${t.userName}</div>
          <div class="span">S${t.startSeason} – ${endLabel}</div>
          ${alsoStr ? `<div class="also">${alsoStr}</div>` : ''}
        </div>`;
        if(i < chain.length-1){
          html += `<div class="tree-arrow">→</div>`;
        }
      });
      html += `</div></div>`;
    });

    html += `</div>`;
  });

  return html;
}

    async ()=>{
      state = parsed;

  );

}

function attachHandlers(){
  document.querySelectorAll('input[data-setting]').forEach(inp=>{
    if(READ_ONLY){ inp.disabled = true; return; }
    inp.addEventListener('input', (e)=>{
      const key = e.target.dataset.setting;
      state.weights[key] = Number(e.target.value);
      document.getElementById('val-'+key).textContent = e.target.value;
    });
    inp.addEventListener('change', async ()=>{ await saveState(); render(); });
  });

  const weeklyInp = document.getElementById('weeklySearchInput');
  if(weeklyInp){
    weeklyInp.addEventListener('input', (e)=>{
      weeklySearch = e.target.value;
      const cursor = e.target.selectionStart;
      render();
      const fresh = document.getElementById('weeklySearchInput');
      if(fresh){ fresh.focus(); fresh.setSelectionRange(cursor, cursor); }
    });
  }
  const overallInp = document.getElementById('overallSearchInput');
  if(overallInp){
    overallInp.addEventListener('input', (e)=>{
      overallSearch = e.target.value;
      const cursor = e.target.selectionStart;
      render();
      const fresh = document.getElementById('overallSearchInput');
      if(fresh){ fresh.focus(); fresh.setSelectionRange(cursor, cursor); }
    });
  }

  const schedBowlCb = document.getElementById('schedBowl');
  if(schedBowlCb){
    const schedBowlRow = document.getElementById('schedBowlNameRow');
    schedBowlCb.addEventListener('change', ()=>{
      if(schedBowlRow) schedBowlRow.style.display = schedBowlCb.checked ? 'block' : 'none';
    });
  }
}

function openTeamDetail(teamName){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  const t = state.teams[teamName];
  const allGames = t.allGames || [];

  const totalW = allGames.filter(g=>g.pf>g.pa).length;
  const totalL = allGames.filter(g=>g.pf<g.pa).length;
  const totalT = allGames.filter(g=>g.pf===g.pa).length;

  const isBigGame = g => g.types && (g.types.rivalry||g.types.bowl||g.types.ccg||g.types.playoff||g.types.natTitle);
  const bigGames = allGames.filter(isBigGame).sort((a,b)=>a.season-b.season);
  const bigW = bigGames.filter(g=>g.pf>g.pa).length;
  const bigL = bigGames.filter(g=>g.pf<g.pa).length;

  const h2h = {};
  allGames.forEach(g=>{
    if(!h2h[g.opponent]) h2h[g.opponent] = {w:0,l:0,t:0,pf:0,pa:0};
    const r = h2h[g.opponent];
    if(g.pf>g.pa) r.w++; else if(g.pf<g.pa) r.l++; else r.t++;
    r.pf += g.pf; r.pa += g.pa;
  });
  const h2hRows = Object.keys(h2h).sort().map(opp=>{
    const r = h2h[opp];
    const rec = r.t>0 ? `${r.w}-${r.l}-${r.t}` : `${r.w}-${r.l}`;
    return `<tr><td>${opp}</td><td class="mono">${rec}</td><td class="mono">${r.pf}-${r.pa}</td></tr>`;
  }).join("") || `<tr><td colspan="3" class="empty">No games logged yet</td></tr>`;

  const bigRows = bigGames.length ? bigGames.map(g=>{
    const result = g.pf>g.pa ? "W" : (g.pf<g.pa?"L":"T");
    const nameStr = (g.types.bowl && g.bowlName) ? `<div class="mono" style="color:var(--gold);font-size:11px">${g.bowlName}</div>` : "";
    return `<tr><td>S${g.season}</td><td>${g.opponent}${nameStr}<div>${gameTypeBadges(g)}</div></td><td class="mono">${g.pf}-${g.pa}</td><td class="mono">${result}</td></tr>`;
  }).join("") : `<tr><td colspan="4" class="empty">No rivalry, bowl, championship, playoff, or title games logged</td></tr>`;

  const histRows = t.history.length ? t.history.map(h=>
    `<tr><td>Season ${h.season}</td><td class="rating">${h.rating.toFixed(1)}</td></tr>`
  ).join("") : `<tr><td colspan="2" class="empty">No completed seasons yet</td></tr>`;

  bg.innerHTML = `<div class="modal" style="max-width:640px;max-height:82vh;overflow-y:auto">
    <h3 style="margin-top:0">${teamName}</h3>
    <div class="hint" style="margin-bottom:14px">
      Career Rating <span class="rating">${t.careerRating.toFixed(1)}</span>
      &nbsp;·&nbsp; All-Time Record <span class="mono">${totalW}-${totalL}${totalT?'-'+totalT:''}</span>
      &nbsp;·&nbsp; Big Game Record <span class="mono">${bigW}-${bigL}</span>
    </div>

    <h3 style="font-size:14px">Season-by-Season Rating</h3>
    <table style="margin-bottom:16px"><thead><tr><th>Season</th><th>Career Rating</th></tr></thead>
      <tbody>${histRows}</tbody></table>

    <h3 style="font-size:14px">Big Games <span class="tier-tag">Rivalry · Bowl · Conf. Champ · Playoff · Title</span></h3>
    <table style="margin-bottom:16px"><thead><tr><th>Season</th><th>Opponent</th><th>Score</th><th>Result</th></tr></thead>
      <tbody>${bigRows}</tbody></table>

    <h3 style="font-size:14px">All-Time Record vs. Opponents Faced</h3>
    <table style="margin-bottom:16px"><thead><tr><th>Opponent</th><th>Record</th><th>Points</th></tr></thead>
      <tbody>${h2hRows}</tbody></table>

    <div style="display:flex;justify-content:flex-end">
      <button class="action secondary" id="detailClose">Close</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#detailClose').onclick = ()=>bg.remove();
  bg.addEventListener('click', (e)=>{ if(e.target===bg) bg.remove(); });
  applyReadOnlyLock();
}
window.openTeamDetail = openTeamDetail;

function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

async function addGame(teamName){
  if(READ_ONLY) return;
  const oppSel = document.getElementById('oppSelect');
  const pfInput = document.getElementById('pfInput');
  const paInput = document.getElementById('paInput');
  const opponent = oppSel.value;
  const pf = Number(pfInput.value);
  const pa = Number(paInput.value);
  if(pfInput.value==="" || paInput.value===""){ return; }
  const types = {
    rivalry: document.getElementById('type-rivalry').checked,
    bowl: document.getElementById('type-bowl').checked,
    ccg: document.getElementById('type-ccg').checked,
    playoff: document.getElementById('type-playoff').checked,
    natTitle: document.getElementById('type-natTitle').checked,
  };
  const bowlName = types.bowl ? document.getElementById('bowlNameInput').value.trim() : "";
  const neutral = document.getElementById('type-neutral').checked;
  const awayGame = document.getElementById('type-away').checked;
  const site = neutral ? "neutral" : (awayGame ? "away" : "home");
  state.teams[teamName].allGames.push({
    id: genId(), opponent, pf, pa, types, bowlName, site, week: state.week, season: state.season
  });
  await saveState();
  const bg = document.getElementById('scheduleModalBg');
  renderScheduleModal(bg, teamName);
  render();
}
window.addGame = addGame;

async function removeGame(teamName, id){
  if(READ_ONLY) return;
  const t = state.teams[teamName];
  const game = (t.allGames||[]).find(g=>g.id===id);
  if(game && game.pairId){
    Object.values(state.teams).forEach(other=>{
      other.allGames = (other.allGames||[]).filter(g=>g.pairId!==game.pairId);
    });
  } else {
    t.allGames = t.allGames.filter(g=>g.id!==id);
  }
  await saveState();
  const bg = document.getElementById('scheduleModalBg');
  if(bg){ renderScheduleModal(bg, teamName); }
  render();
}
window.removeGame = removeGame;

function seasonMatchups(){
  const seen = new Set();
  const rows = [];
  TEAMS.forEach(t=>{
    const games = (state.teams[t.name].allGames||[]).filter(g=>g.season===state.season);
    games.forEach(g=>{
      const week = g.week!==undefined ? g.week : 0;
      if(g.pairId){
        if(seen.has(g.pairId)) return;
        seen.add(g.pairId);
        rows.push({teamA:t.name, teamB:g.opponent, scoreA:g.pf, scoreB:g.pa,
          types:g.types, bowlName:g.bowlName, site:g.site||"home", week, pairId:g.pairId, legacy:false});
      } else {
        rows.push({teamA:t.name, teamB:g.opponent, scoreA:g.pf, scoreB:g.pa,
          types:g.types, bowlName:g.bowlName, site:g.site||"home", week, id:g.id, legacy:true});
      }
    });
  });
  return rows;
}

function liveRankMap(){
  const arr = TEAMS.map(t=>({name:t.name, rating: seasonRating(t.name)}));
  arr.sort((a,b)=>b.rating-a.rating || a.name.localeCompare(b.name));
  const map = {};
  arr.forEach((r,i)=>{ map[r.name] = i+1; });
  return map;
}

function renderSchedule(){
  const opponentOptions = alphabeticalOpponents()
    .map(t=>`<option value="${t.name}">${t.name}${t.name===FCS_TEAM_NAME?' (FCS)':''}</option>`).join("");

  let html = `<div class="card">
    <div class="season-banner">
      <div><span class="num">Season ${state.season} · Week ${state.week}</span></div>
    </div>

  </div>`;

  html += `<div class="card">
    <h3 style="margin-top:0;font-size:14px">Log a Game</h3>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">
      <select id="schedTeamA" style="flex:1;min-width:160px;background:rgba(0,0,0,0.3);color:var(--chalk);border:1px solid var(--turf-line);padding:6px;border-radius:3px">${opponentOptions}</select>

    </div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:8px">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="schedRivalry"> Rivalry Game</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="schedBowl"> Bowl Game</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="schedCCG"> Conf. Championship</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="schedPlayoff"> Playoff Game</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="schedNatTitle"> National Title Game</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="schedNeutral"> Neutral Site</label>
    </div>
    <div class="hint" style="margin-bottom:10px">Unless Neutral Site is checked, the left-hand team is treated as the home team. Road wins count more and road losses count less than home ones — see Settings to adjust exactly how much.</div>
    <div id="schedBowlNameRow" style="display:none;margin-bottom:10px">
      <input type="text" id="schedBowlName" placeholder="Bowl name (e.g. Rose Bowl)" style="width:100%;max-width:300px;background:rgba(0,0,0,0.3);border:1px solid var(--turf-line);color:var(--chalk);padding:6px;border-radius:3px">
    </div>
    <button class="action" onclick="addMatchup()">Log Game</button>
    <div id="schedError" class="hint" style="color:#e07a6b;margin-top:8px;display:none">Pick two different teams and enter both scores.</div>
  </div>`;

  const rows = seasonMatchups();
  const liveRanks = liveRankMap();
  const seasonSnapsByWeek = {};
  state.weeklySnapshots.filter(s=>s.season===state.season).forEach(s=>{ seasonSnapsByWeek[s.week] = s; });
  function rankForWeek(team, week){
    if(team === FCS_TEAM_NAME) return `<span style="color:var(--chalk-dim)">FCS</span>`;
    const snap = seasonSnapsByWeek[week];
    if(snap){
      const r = snapRank(snap, team);
      if(r!==undefined) return `#${r}`;
    }
    return `#${liveRanks[team]!==undefined ? liveRanks[team] : "?"} <span style="color:var(--chalk-dim)">(current)</span>`;
  }

  const rowsByWeek = {};
  rows.forEach(r=>{ (rowsByWeek[r.week] = rowsByWeek[r.week] || []).push(r); });
  const weekKeys = Object.keys(rowsByWeek).map(Number).sort((a,b)=>a-b);

  html += `<div class="card"><h3 style="margin-top:0;font-size:14px">Season ${state.season} Games Logged</h3>
  <div class="hint" style="margin-bottom:10px">Rankings shown are from the snapshot taken for that week, if one exists (via "Advance Week" on the Weekly tab) — otherwise the current live rank is shown, marked (current).</div>`;
  if(rows.length===0){
    html += `<div class="empty">No games logged yet this season</div>`;
  }
  weekKeys.forEach(week=>{
    html += `<h3 style="font-size:13px;margin:16px 0 6px;color:var(--gold)">Week ${week}</h3>
    <table><thead><tr><th>Matchup</th><th>Score</th><th>Site</th><th>Type</th><th></th></tr></thead><tbody>`;

      const nameStr = (r.types && r.types.bowl && r.bowlName) ? ` <span class="mono" style="color:var(--gold)">${r.bowlName}</span>` : "";
      let siteStr;
      if(r.site === "neutral"){
        siteStr = `<span class="tier-tag">Neutral</span>`;
      } else if(r.site === "away"){
        siteStr = `<span style="color:var(--chalk-dim);font-size:11px">${r.teamB} home, ${r.teamA} away</span>`;
      } else {
        siteStr = `<span style="color:var(--chalk-dim);font-size:11px">${r.teamA} home, ${r.teamB} away</span>`;
      }
      const removeCall = r.legacy
        ? `removeGame('${r.teamA.replace(/'/g,"\\'")}','${r.id}')`
        : `removeMatchup('${r.pairId}')`;
      html += `<tr>
        <td><span class="mono" style="color:var(--gold)">${rankForWeek(r.teamA, week)}</span> ${r.teamA} vs
            <span class="mono" style="color:var(--gold)">${rankForWeek(r.teamB, week)}</span> ${r.teamB}${nameStr}</td>
        <td class="mono">${r.scoreA}-${r.scoreB}</td>
        <td>${siteStr}</td>
        <td>${badges}</td>
        <td><button class="action secondary" style="padding:2px 8px;font-size:11px" onclick="${removeCall}">Remove</button></td>
      </tr>`;
    });
    html += `</tbody></table>`;
  });
  html += `</div>`;
  return html;
}

async function addMatchup(){
  if(READ_ONLY) return;
  const teamA = document.getElementById('schedTeamA').value;
  const teamB = document.getElementById('schedTeamB').value;
  const scoreAInput = document.getElementById('schedScoreA');
  const scoreBInput = document.getElementById('schedScoreB');
  const errBox = document.getElementById('schedError');
  if(teamA===teamB || scoreAInput.value==="" || scoreBInput.value===""){
    if(errBox) errBox.style.display = 'block';
    return;
  }
  const scoreA = Number(scoreAInput.value);
  const scoreB = Number(scoreBInput.value);
  const types = {
    rivalry: document.getElementById('schedRivalry').checked,
    bowl: document.getElementById('schedBowl').checked,
    ccg: document.getElementById('schedCCG').checked,
    playoff: document.getElementById('schedPlayoff').checked,
    natTitle: document.getElementById('schedNatTitle').checked,
  };
  const bowlName = types.bowl ? document.getElementById('schedBowlName').value.trim() : "";
  const neutral = document.getElementById('schedNeutral').checked;
  const pairId = genId();
  const siteA = neutral ? "neutral" : "home";
  const siteB = neutral ? "neutral" : "away";
  state.teams[teamA].allGames.push({id:genId(), pairId, opponent:teamB, pf:scoreA, pa:scoreB, types, bowlName, site:siteA, week:state.week, season:state.season});
  state.teams[teamB].allGames.push({id:genId(), pairId, opponent:teamA, pf:scoreB, pa:scoreA, types, bowlName, site:siteB, week:state.week, season:state.season});
  await saveState();
  render();
}
window.addMatchup = addMatchup;

async function removeMatchup(pairId){
  if(READ_ONLY) return;
  Object.values(state.teams).forEach(t=>{
    t.allGames = (t.allGames||[]).filter(g=>g.pairId!==pairId);
  });
  await saveState();
  render();
}
window.removeMatchup = removeMatchup;

function confirmReseed(){
  if(READ_ONLY) return;
  showModal(
    "End Season & Reseed?",
    `This locks in Season ${state.season}'s results, updates every team's Career Rating, and completely re-sorts all 138 teams into new conferences by rank. This can't be undone.`,
    "End Season & Reseed",
    doReseed
  );
}
window.confirmReseed = confirmReseed;

function confirmReset(){
  if(READ_ONLY) return;
  showModal(
    "Reset Entire Dynasty?",
    "This wipes every season of history and returns all teams to their original preseason ratings and conferences. This can't be undone.",
    "Reset Everything",
    async ()=>{ state = defaultState(); await saveState(); render(); }
  );
}
window.confirmReset = confirmReset;

function showModal(title, body, actionLabel, onConfirm){
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `<div class="modal">
    <h3 style="margin-top:0">${title}</h3>
    <p style="color:var(--chalk-dim);font-size:14px;line-height:1.5">${body}</p>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
      <button class="action secondary" id="modalCancel">Cancel</button>
      <button class="action" id="modalConfirm">${actionLabel}</button>
    </div>
  </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#modalCancel').onclick = ()=>bg.remove();
  bg.querySelector('#modalConfirm').onclick = async ()=>{ bg.remove(); await onConfirm(); };
}

async function doReseed(){
  if(READ_ONLY) return;
  const seasonNum = state.season;
  const results = TEAMS.map(t=>{
    const sr = seasonRating(t.name);
    const newCareer = projectedCareerRating(t.name);
    return {name:t.name, sr, newCareer};
  });
  results.forEach(r=>{
    const t = state.teams[r.name];
    t.history.push({season:seasonNum, rating:r.newCareer});
    t.careerRating = r.newCareer;
  });
  results.sort((a,b)=>b.newCareer-a.newCareer || a.name.localeCompare(b.name));
  state.seasonEndRankings.push({
    season: seasonNum,
    ranks: Object.fromEntries(results.map((r,i)=>[r.name, i+1]))
  });
  let idx=0;
  const newConfs = {};
  CONF_ORDER.forEach(c=>{
    const n = CONF_SIZE[c];
    newConfs[c] = results.slice(idx, idx+n).map(r=>r.name);
    idx += n;
  });
  state.conferences = newConfs;
  state.season += 1;
  state.week = 0;
  weeklyViewWeek = null;
  await saveState();
  render();
}

function backfillSeason1Week0(){
  if(state.season !== 1) return; // only applies while still in the very first season
  state.weeklySnapshots = state.weeklySnapshots.filter(s=>!(s.season===1 && s.week===0));
  const arr = TEAMS.map(t=>({name:t.name, rating:t.rating})); // true preseason rating, unaffected by any games logged since
  arr.sort((a,b)=>b.rating-a.rating || a.name.localeCompare(b.name));
  const entries = {};
  arr.forEach((r,i)=>{ entries[r.name] = {rank:i+1, rating:r.rating}; });
  state.weeklySnapshots.push({season:1, week:0, entries});
}

(async function init(){
  await loadState();
  if(READ_ONLY){
    const b = document.getElementById('readonlyBanner');
    if(b) b.style.display = 'block';
  } else {
    backfillSeason1Week0();
    await saveState();
    renderStorageBanner();
  }
  render();
})();
</script>
